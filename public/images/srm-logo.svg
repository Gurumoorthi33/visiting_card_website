<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c97a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main diamond shape - top -->
  <polygon points="100,20 140,60 100,100 60,60" fill="url(#goldGradient)" filter="url(#glow)" opacity="0.95"/>
  
  <!-- Main diamond shape - right -->
  <polygon points="140,60 180,100 140,140 100,100" fill="url(#goldGradient)" filter="url(#glow)" opacity="0.9"/>
  
  <!-- Main diamond shape - bottom -->
  <polygon points="100,100 140,140 100,180 60,140" fill="url(#goldGradient)" filter="url(#glow)" opacity="0.85"/>
  
  <!-- Main diamond shape - left -->
  <polygon points="60,60 100,100 60,140 20,100" fill="url(#goldGradient)" filter="url(#glow)" opacity="0.9"/>
  
  <!-- Central circle - blue accent -->
  <circle cx="100" cy="100" r="28" fill="#0e7a7a" filter="url(#glow)" opacity="0.9"/>
  <circle cx="100" cy="100" r="24" fill="#1a9999" opacity="0.7"/>
  
  <!-- Inner highlight -->
  <circle cx="100" cy="95" r="12" fill="#7de8e8" opacity="0.6"/>
  
  <!-- Corner accents -->
  <circle cx="100" cy="30" r="5" fill="url(#goldGradient)" opacity="0.8"/>
  <circle cx="170" cy="100" r="5" fill="url(#goldGradient)" opacity="0.8"/>
  <circle cx="100" cy="170" r="5" fill="url(#goldGradient)" opacity="0.8"/>
  <circle cx="30" cy="100" r="5" fill="url(#goldGradient)" opacity="0.8"/>
</svg>
